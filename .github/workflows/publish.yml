name: Publish and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # -------------------------------------------------------
  # Build binaries for all platforms
  # -------------------------------------------------------
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows
            ext: ".exe"
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: macos
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build demo
        run: cargo build --release --bin demo --target ${{ matrix.target }}

      - name: Build tcp_demo
        run: cargo build --release --bin tcp_demo --target ${{ matrix.target }} --features transport

      - name: Rename artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/demo${{ matrix.ext }} dist/demo-${{ matrix.suffix }}${{ matrix.ext }}
          cp target/${{ matrix.target }}/release/tcp_demo${{ matrix.ext }} dist/tcp_demo-${{ matrix.suffix }}${{ matrix.ext }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: dist/

  # -------------------------------------------------------
  # Create GitHub Release and attach all binaries
  # -------------------------------------------------------
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --target main \
            dist/*

  # -------------------------------------------------------
  # Publish to crates.io
  # -------------------------------------------------------
  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish --all-features
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
